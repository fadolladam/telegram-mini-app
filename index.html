<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="description" content="TG Store — Premium Telegram Mini App Shopping" />
  <title>TG Store</title>

  <!-- Telegram Mini App SDK (must load before app.js) -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       APP WRAPPER
  ════════════════════════════════════════════════ -->
  <div id="app">

    <!-- ── HEADER ──────────────────────────────── -->
    <header class="header" id="header">
      <div class="header-left">
        <span class="header-logo" aria-hidden="true">🛍️</span>
        <div class="header-title">
          <h1 class="store-name" id="storeName">TG Store</h1>
          <p class="store-tagline" id="storeTagline">Premium Mobile Shopping</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="wishlistBtn" aria-label="Open wishlist">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          <span class="badge hidden" id="wishlistCount">0</span>
        </button>
        <button class="icon-btn" id="cartBtn" aria-label="Open cart">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span class="badge hidden" id="cartCount">0</span>
        </button>
      </div>
    </header>

    <!-- ── SEARCH BAR ───────────────────────────── -->
    <div class="search-section">
      <div class="search-wrapper">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search products, brands, categories…"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
        <button class="search-clear hidden" id="clearSearch" aria-label="Clear search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ── MAIN CONTENT ─────────────────────────── -->
    <main class="main" id="mainContent">

      <!-- BANNER CAROUSEL -->
      <section class="carousel-section" aria-label="Promotions">
        <div class="carousel-viewport">
          <div class="carousel-track" id="carouselTrack"></div>
        </div>
        <div class="carousel-dots" id="carouselDots" role="tablist" aria-label="Banner navigation"></div>
      </section>

      <!-- CATEGORY FILTER -->
      <section class="categories-section" aria-label="Product categories">
        <div class="categories-scroll" id="categoryList" role="list"></div>
      </section>

      <!-- SORT BAR -->
      <div class="sort-bar">
        <span class="results-count" id="resultsCount" aria-live="polite"></span>
        <div class="sort-wrapper">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/>
            <line x1="12" y1="18" x2="20" y2="18"/>
          </svg>
          <select id="sortSelect" class="sort-select" aria-label="Sort products">
            <option value="popular">Popular</option>
            <option value="price-low">Price: Low → High</option>
            <option value="price-high">Price: High → Low</option>
            <option value="newest">Newest</option>
          </select>
        </div>
      </div>

      <!-- PRODUCT GRID -->
      <section class="products-section" aria-label="Products">
        <div class="product-grid" id="productGrid"></div>

        <!-- Empty state: no results -->
        <div class="empty-state hidden" id="emptyProducts">
          <div class="empty-icon">🔍</div>
          <h3 class="empty-title">No products found</h3>
          <p class="empty-desc">Try a different keyword or category</p>
          <button class="btn-secondary" onclick="resetFilters()">Clear Filters</button>
        </div>
      </section>

    </main>
  </div><!-- /#app -->

  <!-- ═══════════════════════════════════════════════
       PRODUCT DETAIL MODAL
  ════════════════════════════════════════════════ -->
  <div class="overlay" id="productModal" role="dialog" aria-modal="true" aria-label="Product detail">
    <div class="sheet product-sheet" id="productSheet">
      <div class="sheet-handle" aria-hidden="true"></div>
      <button class="sheet-close" id="closeProductModal" aria-label="Close product detail">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
      <div class="modal-hero" id="modalHero" aria-hidden="true"></div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       CART PANEL
  ════════════════════════════════════════════════ -->
  <div class="overlay" id="cartPanel" role="dialog" aria-modal="true" aria-label="Shopping cart">
    <div class="sheet panel-sheet">
      <div class="sheet-handle" aria-hidden="true"></div>
      <div class="sheet-header">
        <h2 class="sheet-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          My Cart
        </h2>
        <button class="sheet-close-btn" id="closeCart" aria-label="Close cart">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>

      <div class="sheet-body" id="cartBody">
        <div class="cart-items" id="cartItems"></div>
        <div class="empty-state hidden" id="cartEmpty">
          <div class="empty-icon">🛒</div>
          <h3 class="empty-title">Your cart is empty</h3>
          <p class="empty-desc">Browse products and add items to your cart</p>
        </div>
      </div>

      <div class="cart-footer hidden" id="cartFooter">
        <div class="cart-summary">
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="cartSubtotal">$0.00</span>
          </div>
          <div class="summary-row delivery-row">
            <span>Delivery</span>
            <span id="cartDelivery">$0.00</span>
          </div>
          <div class="summary-divider"></div>
          <div class="summary-row summary-total">
            <span>Total</span>
            <span id="cartTotal">$0.00</span>
          </div>
        </div>
        <button class="btn-checkout" id="checkoutBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <polyline points="9 11 12 14 22 4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
          Proceed to Checkout
        </button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       WISHLIST PANEL
  ════════════════════════════════════════════════ -->
  <div class="overlay" id="wishlistPanel" role="dialog" aria-modal="true" aria-label="Wishlist">
    <div class="sheet panel-sheet">
      <div class="sheet-handle" aria-hidden="true"></div>
      <div class="sheet-header">
        <h2 class="sheet-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          Wishlist
        </h2>
        <button class="sheet-close-btn" id="closeWishlist" aria-label="Close wishlist">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>

      <div class="sheet-body" id="wishlistBody">
        <div class="wishlist-grid" id="wishlistItems"></div>
        <div class="empty-state hidden" id="wishlistEmpty">
          <div class="empty-icon">💝</div>
          <h3 class="empty-title">Your wishlist is empty</h3>
          <p class="empty-desc">Tap the ♡ on any product to save it here</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ── TOAST NOTIFICATION ──────────────────────── -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
